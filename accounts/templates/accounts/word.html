{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OfficeEase - Word Course</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .lesson-scroll::-webkit-scrollbar { width: 4px; }
        .lesson-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .active-lesson { border-left: 4px solid #2563eb !important; background-color: #eff6ff !important; color: #1e40af !important; font-weight: 700; }
        .accordion-content { transition: max-height 0.3s ease-out; overflow: hidden; max-height: 0; }
        .accordion-content.open { max-height: 500px; padding-bottom: 1rem; }
    </style>
</head>
<body class="container bg-white text-black pt-1 mx-auto font-sans">

    <nav class="max-w-7xl mx-auto flex items-center justify-between bg-blue-50 px-10 py-3 rounded-2xl mt-2 mx-4">
        <div class="flex items-center gap-8">
            <div class="text-3xl font-semibold text-slate-900 tracking-tight">OfficeEase</div>
            <div class="relative group cursor-pointer">
                <div class="flex items-center gap-1 hover:text-black">
                    <a href="javascript:void(0)">Courses</a>
                    <i class="fa-solid fa-chevron-down text-[10px] opacity-50 group-hover:rotate-180 transition-transform"></i>
                </div>
                <ul class="absolute left-0 mt-2 w-48 bg-white border border-slate-100 rounded-xl shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-[100] p-2">
                    <li><a href="{% url 'word_course' %}" class="flex items-center gap-3 px-4 py-3 text-blue-600 bg-blue-50 rounded-lg"><i class="fa-solid fa-file-word"></i> Word</a></li>
                </ul>
            </div>
        </div>
        <div class="w-9 h-9 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold">
            {{ user.first_name|slice:":1"|upper }}
        </div>
    </nav>

    <main class="max-w-7xl mx-auto mt-8 px-4 lg:px-10 pb-20">
        <div class="flex flex-col lg:flex-row gap-8">
            <aside class="lg:w-1/3">
                <div class="bg-slate-50 border border-slate-200 rounded-[2rem] p-6 sticky top-5 shadow-sm">
                    <div class="mb-6 flex justify-between items-end">
                        <h2 class="text-2xl font-black italic text-[#2b579a]">Word</h2>
                        <span id="progress-text" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">0 of {{ lessons|length }} complete</span>
                    </div>
                    <div class="border border-blue-200 rounded-2xl overflow-hidden bg-white shadow-md">
                        <div class="p-4 bg-blue-600 text-white flex justify-between items-center">
                            <span class="text-sm font-bold">Modules</span>
                            <span id="progress-badge" class="text-[10px] bg-blue-500 px-2 py-1 rounded">0/{{ lessons|length }}</span>
                        </div>
                        <div id="lesson-list" class="lesson-scroll max-h-[450px] overflow-y-auto p-2 space-y-1">
                            {% for lesson in lessons %}
                            <button onclick="jumpToLesson({{ forloop.counter0 }})" id="btn-{{ forloop.counter0 }}" 
                                    class="w-full text-left p-4 rounded-xl text-xs flex items-center gap-3 transition-all font-medium text-slate-500">
                                <i class="fa-regular fa-circle" id="check-{{ forloop.counter0 }}"></i> 
                                {{ lesson.label }}. {{ lesson.title }}
                            </button>
                            {% endfor %}
                        </div>
                    </div>
                </div>
            </aside>

            <section class="lg:w-2/3">
                <div class="bg-white border border-slate-200 rounded-[2.5rem] p-8 lg:p-12 shadow-2xl relative overflow-hidden">
                    
                    <div id="feedback-correct" class="hidden absolute inset-0 bg-emerald-500/95 z-50 flex flex-col items-center justify-center text-white p-10 text-center">
                        <i class="fa-solid fa-circle-check text-7xl mb-4"></i>
                        <h2 class="text-4xl font-black mb-2 text-white">Excellent!</h2>
                        <button onclick="moveToNextLesson()" class="bg-white text-emerald-600 px-10 py-4 rounded-xl font-black uppercase tracking-widest">Continue</button>
                    </div>

                    <div id="feedback-wrong" class="hidden absolute inset-0 bg-red-500/95 z-50 flex flex-col items-center justify-center text-white p-10 text-center">
                        <i class="fa-solid fa-circle-xmark text-7xl mb-4"></i>
                        <h2 class="text-4xl font-black mb-2 text-white">Try Again</h2>
                        <p id="error-details" class="mb-8 font-medium text-lg text-white"></p>
                        <button onclick="closeFeedback()" class="bg-white text-red-600 px-10 py-4 rounded-xl font-black uppercase tracking-widest">Review</button>
                    </div>

                    <div class="mb-10">
                        <div class="flex items-center gap-2 mb-4">
                            <span class="w-2 h-2 bg-blue-600 rounded-full"></span>
                            <span id="module-label" class="text-[10px] font-black uppercase text-blue-600 tracking-widest italic"></span>
                        </div>
                        <h1 id="lesson-title" class="text-5xl font-black text-slate-900 leading-tight"></h1>
                    </div>

                    <div id="lesson-theory" class="text-slate-600 mb-10 text-lg leading-relaxed"></div>

                    <div class="mb-12 h-[600px] rounded-xl overflow-hidden border border-slate-300">
                        <iframe id="word-frame" src="" width="100%" height="100%" frameborder="0"></iframe>
                    </div>

                    <div class="bg-blue-50 rounded-3xl p-8 border border-blue-100 shadow-sm">
                        <div id="quiz-container" class="space-y-3 mb-8"></div>
                        <button onclick="checkAllAnswers()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-lg">Submit Answers</button>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script>
        const dbLessons = [
            {% for lesson in lessons %}
            {
                label: "{{ lesson.label|escapejs }}",
                title: "{{ lesson.title|escapejs }}",
                theory: "{{ lesson.theory|safe|escapejs }}",
                embed_url: "{{ lesson.embed_url|escapejs }}",
                questions: [
                    {% for q in lesson.questions.all %}
                    { 
                        q: "{{ q.question_text|escapejs }}", 
                        opts: ["{{ q.option_1|escapejs }}", "{{ q.option_2|escapejs }}"], 
                        ans: "{{ q.correct_answer|escapejs }}" 
                    }{% if not forloop.last %},{% endif %}
                    {% endfor %}
                ]
            }{% if not forloop.last %},{% endif %}
            {% endfor %}
        ];
    </script>

    <script src="{% static 'js/course_logic.js' %}"></script>

    <script>
        // Start first lesson
        if (dbLessons.length > 0) {
            loadLesson(0);
        } else {
            document.getElementById('lesson-title').innerText = "No Lessons Added Yet";
        }
    </script>
</body>
</html>
